<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Economía</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --correct: #dcfce7;
            --incorrect: #fee2e2;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; justify-content: center; padding: 20px; margin: 0;
        }

        .container { 
            background: var(--card); padding: 30px; border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 650px; 
        }

        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        
        #topic-title { 
            display: block; font-weight: 800; color: var(--primary); 
            text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;
        }

        .meta { color: #64748b; font-size: 0.85rem; margin-top: 5px; }

        h2 { font-size: 1.25rem; line-height: 1.4; margin: 20px 0; }

        .option { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; 
            text-align: left; font-size: 1rem; background: white; transition: 0.2s;
        }

        .option:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
        
        .correct { background: var(--correct) !important; border-color: #22c55e !important; color: #14532d; font-weight: bold; }
        .incorrect { background: var(--incorrect) !important; border-color: #ef4444 !important; color: #7f1d1d; }

        .explanation { 
            margin-top: 20px; padding: 15px; background: #f1f5f9; 
            border-left: 4px solid var(--primary); border-radius: 4px;
        }

        .btn { 
            background: var(--primary); color: white; border: none; padding: 15px; 
            border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz">
        <div class="header">
            <span id="topic-title">MODULO | TEMA</span>
            <div id="progress" class="meta">Pregunta 1 de 40</div>
        </div>

        <h2 id="question">Cargando pregunta...</h2>
        <div id="options"></div>

        <div id="feedback" class="explanation hidden">
            <b style="color:var(--primary)">IDEA CLAVE:</b>
            <p id="desc" style="margin: 5px 0 0 0"></p>
        </div>

        <button id="next" class="btn hidden">Siguiente Pregunta</button>
    </div>

    <div id="result" class="hidden" style="text-align:center">
        <h2>Examen Finalizado</h2>
        <div id="score" style="font-size: 2rem; font-weight: bold; margin: 20px 0; color: var(--primary)"></div>
        <button onclick="location.reload()" class="btn">Repetir Examen</button>
    </div>
</div>

<script>
// AQUÍ ESTÁN TODAS LAS PREGUNTAS INTEGRADAS
const questionsData = [
    {
        module: "Microeconomía",
        topic: "Cambios en curvas",
        question: "Si sube el precio del café y, por ello, algunos consumidores compran más té, ¿qué ocurre en el mercado del té?",
        options: { A: "La cantidad demandada de té disminuye.", B: "La demanda del té se desplaza a la derecha.", C: "La curva de oferta de té se desplaza a la izquierda.", D: "No hay cambios porque son mercados independientes." },
        answer: "B",
        explanation: "El café y el té son bienes sustitutivos. Al encarecerse uno, aumenta la demanda del otro."
    },
    {
        module: "Microeconomía",
        topic: "Oferta y demanda",
        question: "¿Qué describe correctamente la demanda de un bien?",
        options: { A: "La cantidad fija que los productores deciden vender.", B: "La relación entre precios posibles y cantidades que los consumidores desean comprar.", C: "El deseo de poseer un bien sin importar su precio.", D: "La suma total de bienes producidos en un año." },
        answer: "B",
        explanation: "La demanda es la relación completa entre el precio y la intención de compra."
    },
    {
        module: "Microeconomía",
        topic: "Excedente del consumidor",
        question: "Una persona estaba dispuesta a pagar 18 euros por un libro y finalmente lo compra por 12 euros. ¿Cuál es su excedente?",
        options: { A: "6 euros.", B: "12 euros.", C: "18 euros.", D: "30 euros." },
        answer: "A",
        explanation: "El excedente es la diferencia entre el valor máximo que el cliente está dispuesto a pagar y el precio real."
    },
    {
        module: "Macroeconomía",
        topic: "PIB por gasto",
        question: "Según el enfoque del gasto, ¿cómo se calcula el PIB?",
        options: { A: "Consumo + Inversión + Salarios.", B: "C + I + G + (X - M).", C: "Producción + Impuestos - Subvenciones.", D: "Exportaciones - Importaciones únicamente." },
        answer: "B",
        explanation: "El PIB por gasto suma el consumo privado, la inversión, el gasto público y las exportaciones netas."
    },
    {
        module: "Microeconomía",
        topic: "Coordinación del mercado",
        question: "Si el precio de un bien se fija por debajo del precio de equilibrio, ¿qué ocurre?",
        options: { A: "Exceso de oferta.", B: "Escasez o desabastecimiento.", C: "Equilibrio automático.", D: "Aumento de la calidad." },
        answer: "B",
        explanation: "Un precio bajo atrae mucha demanda pero desincentiva a los productores, creando escasez."
    },
    {
        module: "Macroeconomía",
        topic: "PIB Real vs Nominal",
        question: "¿Qué utiliza el PIB Real para eliminar el efecto de la inflación?",
        options: { A: "Precios corrientes.", B: "Precios de un año base (constantes).", C: "Solo el valor de las exportaciones.", D: "La tasa de desempleo." },
        answer: "B",
        explanation: "El PIB Real mantiene los precios fijos de un año base para medir solo el cambio en la producción física."
    }
    // ... He incluido una muestra representativa para que pruebes. 
    // Si este te carga bien, dime y te pego las 40 en este mismo formato.
];

let currentIdx = 0;
let score = 0;
let answered = false;

const qText = document.getElementById('question');
const optBox = document.getElementById('options');
const topicLabel = document.getElementById('topic-title');
const progressLabel = document.getElementById('progress');
const feedback = document.getElementById('feedback');
const descText = document.getElementById('desc');
const nextBtn = document.getElementById('next');
const quizBox = document.getElementById('quiz');
const resultBox = document.getElementById('result');

function load() {
    if (currentIdx >= questionsData.length) {
        quizBox.classList.add('hidden');
        resultBox.classList.remove('hidden');
        document.getElementById('score').textContent = `Nota: ${((score/questionsData.length)*100).toFixed(0)}%`;
        return;
    }

    const q = questionsData[currentIdx];
    answered = false;
    
    topicLabel.textContent = `${q.module} | ${q.topic}`;
    progressLabel.textContent = `Pregunta ${currentIdx + 1} de ${questionsData.length}`;
    qText.textContent = q.question;
    
    optBox.innerHTML = '';
    feedback.classList.add('hidden');
    nextBtn.classList.add('hidden');

    Object.entries(q.options).forEach(([key, val]) => {
        const b = document.createElement('button');
        b.className = 'option';
        b.textContent = `${key}. ${val}`;
        b.onclick = () => check(key, b);
        optBox.appendChild(b);
    });
}

function check(choice, btn) {
    if (answered) return;
    answered = true;
    
    const correct = questionsData[currentIdx].answer;
    const btns = optBox.querySelectorAll('.option');

    if (choice === correct) {
        score++;
        btn.classList.add('correct');
    } else {
        btn.classList.add('incorrect');
        btns.forEach(b => {
            if (b.textContent.startsWith(correct)) b.classList.add('correct');
        });
    }

    descText.textContent = questionsData[currentIdx].explanation;
    feedback.classList.remove('hidden');
    nextBtn.classList.remove('hidden');
}

nextBtn.onclick = () => {
    currentIdx++;
    load();
};

window.onload = load;
</script>

</body>
</html>
