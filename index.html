<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Economía - Con Ejemplos</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --correct: #dcfce7; --incorrect: #fee2e2; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 650px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        #topic-title { display: block; font-weight: 800; color: var(--primary); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        .meta { color: #64748b; font-size: 0.85rem; margin-top: 5px; }
        h2 { font-size: 1.25rem; line-height: 1.4; margin: 20px 0; }
        .option { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; text-align: left; font-size: 1rem; background: white; transition: 0.2s; }
        .option:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
        .correct { background: var(--correct) !important; border-color: #22c55e !important; color: #14532d; font-weight: bold; }
        .incorrect { background: var(--incorrect) !important; border-color: #ef4444 !important; color: #7f1d1d; }
        .explanation-box { margin-top: 20px; padding: 15px; background: #f1f5f9; border-left: 4px solid var(--primary); border-radius: 4px; text-align: left; }
        .example-box { margin-top: 10px; padding: 10px; background: #e0f2fe; border-radius: 8px; border: 1px dashed #0ea5e9; font-style: italic; font-size: 0.95rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div id="quiz">
        <div class="header">
            <span id="topic-title">MÓDULO</span>
            <div id="progress" class="meta">Pregunta 1 de 40</div>
        </div>
        <h2 id="question">Cargando...</h2>
        <div id="options"></div>
        <div id="feedback" class="hidden">
            <div class="explanation-box">
                <b style="color:var(--primary)">IDEA CLAVE (Examen):</b>
                <p id="desc" style="margin: 5px 0 0 0"></p>
            </div>
            <div class="example-box">
                <b>💡 Ejemplo para entenderlo:</b>
                <p id="example-text" style="margin: 5px 0 0 0"></p>
            </div>
        </div>
        <button id="next" class="btn hidden">Siguiente Pregunta</button>
    </div>
    <div id="result" class="hidden" style="text-align:center">
        <h2>Examen Finalizado</h2>
        <div id="score" style="font-size: 2rem; font-weight: bold; margin: 20px 0; color: var(--primary)"></div>
        <button onclick="location.reload()" class="btn">Repetir Simulador</button>
    </div>
</div>

<script>

        explanation: "Tus apuntes explican que la compra de activos inyecta reservas, sube el precio del activo y reduce su rendimiento.",

    },
    { 
        module: "Macroeconomía", topic: "Creación bancaria", 
        question: "Los bancos comerciales no pueden crear dinero ilimitadamente porque enfrentan límites de:", 
        options: { A: "Papel moneda.", B: "Liquidez, solvencia, demanda de crédito solvente y conversión en dinero del banco central.", C: "Horarios de apertura.", D: "Número de clientes." }, 
        answer: "B", 
        explanation: "El bloque de dinero bancario insiste en esos límites: liquidez, solvencia, crédito solvente y conversión final en dinero del banco central.",
        example: "Un banco no puede prestar dinero a cualquiera si sabe que no se lo van a devolver (solvencia) o si no tiene dinero en la caja por si alguien viene a retirar (liquidez)."
    },
    { 
        module: "Macroeconomía", topic: "Política fiscal", 
        question: "Una política fiscal expansiva suele implicar:", 
        options: { A: "Subir impuestos.", B: "Bajar el gasto.", C: "Bajar impuestos o subir gasto, aumentando el sesgo expansivo del saldo fiscal.", D: "No hacer nada." }, 
        answer: "C", 
        explanation: "Tus apuntes de política fiscal resumen el enfoque convencional así: menos impuestos o más gasto equivalen a un sesgo expansivo.",
        example: "El Gobierno gasta dinero en carreteras o te cobra menos impuestos para que tú tengas más dinero y gastes."
    },
    { 
        module: "Macroeconomía", topic: "Estabilizadores", 
        question: "¿Cuál de los siguientes es un estabilizador automático?", 
        options: { A: "Obras públicas nuevas.", B: "El seguro de desempleo que aumenta el gasto cuando entra la recesión.", C: "Subir tipos de interés.", D: "Imprimir billetes." }, 
        answer: "B", 
        explanation: "El resumen de macro cita de forma expresa el seguro de desempleo y la caída automática de recaudación en recesión.",
        example: "Como los amortiguadores de un coche, actúan solos cuando hay un bache económico."
    },
    { 
        module: "Macroeconomía", topic: "Multiplicador", 
        question: "¿Cuál es una de las críticas principales al multiplicador fiscal?", 
        options: { A: "No existe.", B: "Que el endeudamiento público puede desplazar financiación privada mediante crowding out.", C: "Que es muy lento.", D: "Que solo ayuda a ricos." }, 
        answer: "B", 
        explanation: "Tus apuntes recogen varias críticas, y una de las más claras es el crowding out: deuda publica que desplaza credito privado.",
        example: "Si el Estado se lleva todos los préstamos del banco, no queda dinero para que las familias pidan una hipoteca."
    },
    { 
        module: "Macroeconomía", topic: "Modelo de Solow", 
        question: "En el modelo de Solow, si la inversión por trabajador supera la depreciación más la dilución, entonces:", 
        options: { A: "El capital cae.", B: "El capital por trabajador se profundiza y aumenta.", C: "La economía se detiene.", D: "No hay cambio." }, 
        answer: "B", 
        explanation: "El resumen de Solow distingue entre ampliación y profundización del capital: si la inversión supera depreciación y dilución, k por trabajador aumenta.",
        example: "Si compras máquinas nuevas más rápido de lo que se rompen las viejas y de lo que crece la población, cada trabajador tendrá más máquinas para producir."
    },
    { 
        module: "Macroeconomía", topic: "Regla de oro de Solow", 
        question: "La regla de oro de Solow busca el nivel de capital por trabajador que:", 
        options: { A: "Maximiza el consumo sostenible de largo plazo.", B: "Maximiza el PIB.", C: "Elimina el paro.", D: "Es cero." }, 
        answer: "A", 
        explanation: "Tus apuntes aclaran que la regla de oro no busca acumular sin límite, sino el capital que maximiza el consumo sostenible.",
        example: "No sirve de nada tener mil máquinas si para mantenerlas hay que ahorrar tanto que no nos queda dinero para comer (consumir)."
    },
    { 
        module: "Macroeconomía", topic: "Mercado de trabajo", 
        question: "Si el salario mínimo sube claramente por encima de la productividad, tenderá a:", 
        options: { A: "Aumentar el empleo.", B: "Reducir la demanda de trabajo de esas personas.", C: "No afectar.", D: "Mejorar la economía." }, 
        answer: "B", 
        explanation: "El resumen de macro relaciona salario máximo sostenible y productividad económica; si el salario exigido supera esa productividad, cae la demanda de trabajo.",
        example: "Si un trabajador produce 10€ de valor a la hora y por ley hay que pagarle 15€, la empresa perderá dinero y acabará despidiéndolo."
    }
];

let currentIdx = 0, score = 0, answered = false;
const qText = document.getElementById('question'), optBox = document.getElementById('options'), 
      topicLabel = document.getElementById('topic-title'), progressLabel = document.getElementById('progress'), 
      feedback = document.getElementById('feedback'), descText = document.getElementById('desc'), 
      exampleText = document.getElementById('example-text'),
      nextBtn = document.getElementById('next'), quizBox = document.getElementById('quiz'), resultBox = document.getElementById('result');

function load() {
    if (currentIdx >= questionsData.length) {
        quizBox.classList.add('hidden'); resultBox.classList.remove('hidden');
        document.getElementById('score').textContent = `Nota Final: ${((score/questionsData.length)*100).toFixed(0)}%`;
        return;
    }
    const q = questionsData[currentIdx]; answered = false;
    topicLabel.textContent = `${q.module} | ${q.topic}`;
    progressLabel.textContent = `Pregunta ${currentIdx + 1} de ${questionsData.length}`;
    qText.textContent = q.question;
    optBox.innerHTML = ''; feedback.classList.add('hidden'); nextBtn.classList.add('hidden');
    Object.entries(q.options).forEach(([key, val]) => {
        const b = document.createElement('button'); b.className = 'option'; b.textContent = `${key}. ${val}`;
        b.onclick = () => { if(!answered){ answered=true; check(key, b); } }; optBox.appendChild(b);
    });
}

function check(choice, btn) {
    const correct = questionsData[currentIdx].answer;
    const btns = optBox.querySelectorAll('.option');
    if (choice === correct) { score++; btn.classList.add('correct'); } 
    else { btn.classList.add('incorrect'); btns.forEach(b => { if (b.textContent.startsWith(correct)) b.classList.add('correct'); }); }
    descText.textContent = questionsData[currentIdx].explanation;
    exampleText.textContent = questionsData[currentIdx].example;
    feedback.classList.remove('hidden'); nextBtn.classList.remove('hidden');
}

nextBtn.onclick = () => { currentIdx++; load(); };
window.onload = load;
</script>

</html>
