<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Economía</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --correct: #dcfce7; --incorrect: #fee2e2; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 650px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        #topic-title { display: block; font-weight: 800; color: var(--primary); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        .meta { color: #64748b; font-size: 0.85rem; margin-top: 5px; }
        h2 { font-size: 1.25rem; line-height: 1.4; margin: 20px 0; }
        .option { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; text-align: left; font-size: 1rem; background: white; transition: 0.2s; }
        .option:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
        .correct { background: var(--correct) !important; border-color: #22c55e !important; color: #14532d; font-weight: bold; }
        .incorrect { background: var(--incorrect) !important; border-color: #ef4444 !important; color: #7f1d1d; }
        .explanation { margin-top: 20px; padding: 15px; background: #f1f5f9; border-left: 4px solid var(--primary); border-radius: 4px; text-align: left; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div id="quiz">
        <div class="header">
            <span id="topic-title">MÓDULO | TEMA</span>
            <div id="progress" class="meta">Cargando...</div>
        </div>
        <h2 id="question">Preparando preguntas...</h2>
        <div id="options"></div>
        <div id="feedback" class="explanation hidden">
            <b style="color:var(--primary)">IDEA CLAVE:</b>
            <p id="desc" style="margin: 5px 0 0 0"></p>
        </div>
        <button id="next" class="btn hidden">Siguiente Pregunta</button>
    </div>
    <div id="result" class="hidden" style="text-align:center">
        <h2>Examen Finalizado</h2>
        <div id="score" style="font-size: 2rem; font-weight: bold; margin: 20px 0; color: var(--primary)"></div>
        <button onclick="location.reload()" class="btn">Repetir Examen</button>
    </div>
</div>

<script>
const questionsData = [
    // MICROECONOMÍA (20)
    { module: "Microeconomía", topic: "Cambios en curvas", question: "Si sube el precio del café y los consumidores compran más té, ¿qué ocurre en el mercado del té?", options: { A: "La cantidad demandada disminuye.", B: "La demanda se desplaza a la derecha.", C: "La oferta se desplaza a la izquierda.", D: "No hay cambios." }, answer: "B", explanation: "Al ser bienes sustitutivos, el encarecimiento de uno aumenta la demanda del otro." },
    { module: "Microeconomía", topic: "Oferta y demanda", question: "¿Qué describe la demanda de un bien?", options: { A: "Cantidad fija vendida.", B: "Relación entre precios y cantidades que se desean comprar.", C: "Deseo sin importar el precio.", D: "Suma de producción." }, answer: "B", explanation: "Representa la intención de compra a distintos niveles de precio." },
    { module: "Microeconomía", topic: "Excedente", question: "Si estás dispuesto a pagar 18€ y pagas 12€, ¿cuál es tu excedente?", options: { A: "6€", B: "12€", C: "18€", D: "30€" }, answer: "A", explanation: "Es la diferencia entre tu disposición máxima a pagar y el precio pagado." },
    { module: "Microeconomía", topic: "Precios", question: "Si el precio está por debajo del equilibrio, hay:", options: { A: "Exceso de oferta.", B: "Escasez.", C: "Equilibrio.", D: "Pérdida de demanda." }, answer: "B", explanation: "A precios bajos, la demanda supera la oferta disponible, generando desabastecimiento." },
    { module: "Microeconomía", topic: "Elasticidad", question: "Si la demanda es elástica, una subida de precio provoca:", options: { A: "Aumento del ingreso.", B: "Disminución del ingreso total.", C: "Ningún efecto.", D: "Aumento de cantidad." }, answer: "B", explanation: "La caída proporcional en la cantidad es mayor que la subida del precio." },
    { module: "Microeconomía", topic: "Costes", question: "El coste de oportunidad es:", options: { A: "El gasto monetario.", B: "La mejor alternativa sacrificada.", C: "El precio de venta.", D: "El coste fijo." }, answer: "B", explanation: "Representa el valor de la renuncia al elegir una opción sobre otra." },
    { module: "Microeconomía", topic: "Producción", question: "La ley de rendimientos decrecientes implica que:", options: { A: "La tecnología falla.", B: "El producto marginal empieza a caer.", C: "No hay trabajadores.", D: "Los costes son cero." }, answer: "B", explanation: "Al añadir factor variable a uno fijo, la productividad extra acaba disminuyendo." },
    { module: "Microeconomía", topic: "Empresa", question: "En competencia perfecta, la empresa maximiza donde:", options: { A: "P = Coste Marginal.", B: "P = Coste Fijo.", C: "Ingreso = 0.", D: "Coste = 0." }, answer: "A", explanation: "El precio de mercado se iguala al coste de producir la última unidad." },
    { module: "Microeconomía", topic: "Monopolio", question: "Un monopolista produce una cantidad:", options: { A: "Mayor que en competencia.", B: "Menor que en competencia.", C: "Igual.", D: "Infinita." }, answer: "B", explanation: "Reduce la cantidad para poder elevar el precio y maximizar su beneficio." },
    { module: "Microeconomía", topic: "Externalidades", question: "Una externalidad negativa genera:", options: { A: "Producción excesiva.", B: "Producción insuficiente.", C: "Eficiencia social.", D: "Menores costes." }, answer: "A", explanation: "Como no se pagan todos los costes (daño social), se produce más de lo óptimo." },
    { module: "Microeconomía", topic: "Bienes Públicos", question: "Un bien público puro se caracteriza por ser:", options: { A: "Rival y excluyente.", B: "No rival y no excluyente.", C: "Rival y no excluyente.", D: "Privado." }, answer: "B", explanation: "Nadie puede ser excluido de su uso y el consumo de uno no reduce el de otros." },
    { module: "Microeconomía", topic: "Utilidad", question: "La utilidad marginal suele ser:", options: { A: "Creciente.", B: "Decreciente.", C: "Constante.", D: "Infinita." }, answer: "B", explanation: "Cada unidad adicional consumida aporta menos satisfacción que la anterior." },
    { module: "Microeconomía", topic: "Precios Mínimos", question: "Un salario mínimo por encima del equilibrio puede generar:", options: { A: "Escasez de trabajadores.", B: "Desempleo (exceso de oferta laboral).", C: "Más contratación.", D: "Equilibrio." }, answer: "B", explanation: "Hay más gente queriendo trabajar que empresas dispuestas a contratar a ese precio." },
    { module: "Microeconomía", topic: "Sustitutivos", question: "Si sube el precio de X y sube la demanda de Y, X e Y son:", options: { A: "Complementarios.", B: "Sustitutivos.", C: "Inferiores.", D: "Lujo." }, answer: "B", explanation: "El consumidor cambia el bien caro por la alternativa más barata." },
    { module: "Microeconomía", topic: "Complementarios", question: "Si sube el precio de la gasolina y baja la demanda de coches:", options: { A: "Son sustitutivos.", B: "Son complementarios.", C: "No tienen relación.", D: "Son bienes Giffen." }, answer: "B", explanation: "Se consumen juntos; si uno encarece el uso del otro, la demanda de ambos cae." },
    { module: "Microeconomía", topic: "Largo Plazo", question: "En el largo plazo, todos los costes son:", options: { A: "Fijos.", B: "Variables.", C: "Cero.", D: "Irrecuperables." }, answer: "B", explanation: "La empresa puede ajustar todos sus factores productivos, incluida la planta." },
    { module: "Microeconomía", topic: "Oligopolio", question: "La característica clave del oligopolio es:", options: { A: "Un solo vendedor.", B: "Interdependencia estratégica.", C: "Muchos pequeños vendedores.", D: "Producto único." }, answer: "B", explanation: "Las decisiones de una empresa afectan directamente a sus pocos competidores." },
    { module: "Microeconomía", topic: "Eficiencia", question: "El excedente total es la suma de:", options: { A: "Precio y cantidad.", B: "Excedente del consumidor y del productor.", C: "Ingresos y costes.", D: "Ahorro e inversión." }, answer: "B", explanation: "Representa el beneficio total que el mercado genera para la sociedad." },
    { module: "Microeconomía", topic: "Teorema Coase", question: "Según Coase, las externalidades se resuelven solas si:", options: { A: "El Estado interviene.", B: "Hay derechos de propiedad definidos y bajos costes de transacción.", C: "Se prohíbe la actividad.", D: "Los impuestos son altos." }, answer: "B", explanation: "Las partes pueden negociar la solución eficiente por su cuenta." },
    { module: "Microeconomía", topic: "Mercados", question: "La 'mano invisible' de Adam Smith se refiere a:", options: { A: "La intervención estatal.", B: "La coordinación automática de los mercados.", C: "El poder de los sindicatos.", D: "La caridad." }, answer: "B", explanation: "El interés propio guía a los mercados hacia un resultado socialmente deseable." },

    // MACROECONOMÍA (20)
    { module: "Macroeconomía", topic: "PIB", question: "El PIB por gasto es la suma de:", options: { A: "C + I + G + (X-M)", B: "S + B", C: "Producción bruta", D: "Importaciones" }, answer: "A", explanation: "Agrupa consumo, inversión, gasto público y exportaciones netas." },
    { module: "Macroeconomía", topic: "Inflación", question: "El PIB Real utiliza:", options: { A: "Precios actuales.", B: "Precios de un año base.", C: "Solo salarios.", D: "Precios futuros." }, answer: "B", explanation: "Mide el crecimiento real eliminando la distorsión de la subida de precios." },
    { module: "Macroeconomía", topic: "Deflactor", question: "El deflactor del PIB sirve para medir:", options: { A: "El paro.", B: "La evolución de todos los precios de la economía.", C: "El déficit.", D: "La deuda pública." }, answer: "B", explanation: "Es un índice de precios que abarca todos los bienes producidos nacionalmente." },
    { module: "Macroeconomía", topic: "Dinero", question: "La oferta monetaria está controlada por:", options: { A: "El Gobierno.", B: "El Banco Central.", C: "Los bancos comerciales.", D: "El Fondo Monetario." }, answer: "B", explanation: "Es la institución encargada de emitir moneda y regular la liquidez." },
    { module: "Macroeconomía", topic: "Desempleo", question: "La tasa de paro se calcula sobre:", options: { A: "La población total.", B: "La población activa.", C: "Los jubilados.", D: "La población infantil." }, answer: "B", explanation: "Mide qué porcentaje de los que quieren y pueden trabajar no tienen empleo." },
    { module: "Macroeconomía", topic: "Crecimiento", question: "El crecimiento a largo plazo depende principalmente de:", options: { A: "El consumo.", B: "La productividad y tecnología.", C: "La impresión de dinero.", D: "Los subsidios." }, answer: "B", explanation: "Mejorar la eficiencia permite producir más con los mismos recursos." },
    { module: "Macroeconomía", topic: "Política Fiscal", question: "Una política fiscal expansiva implica:", options: { A: "Subir impuestos.", B: "Aumentar el gasto público.", C: "Reducir la oferta de dinero.", D: "Cerrar fronteras." }, answer: "B", explanation: "Busca reactivar la economía aumentando la demanda agregada." },
    { module: "Macroeconomía", topic: "Balanza", question: "Un superávit comercial ocurre cuando:", options: { A: "Exportaciones > Importaciones", B: "Importaciones > Exportaciones", C: "Gasto > Ingreso", D: "Ahorro = 0" }, answer: "A", explanation: "El país vende al exterior más valor del que compra." },
    { module: "Macroeconomía", topic: "Tipos de interés", question: "Si el Banco Central sube tipos de interés:", options: { A: "El consumo sube.", B: "La inversión baja.", C: "El dinero fluye más rápido.", D: "La inflación se dispara." }, answer: "B", explanation: "El crédito es más caro, lo que frena los planes de gasto y proyectos empresariales." },
    { module: "Macroeconomía", topic: "Modelo Solow", question: "En el modelo de Solow, el ahorro genera:", options: { A: "Crecimiento perpetuo.", B: "Acumulación de capital por trabajador.", C: "Crisis económicas.", D: "Menor tecnología." }, answer: "B", explanation: "Permite invertir más hasta alcanzar el estado estacionario." },
    { module: "Macroeconomía", topic: "Ciclos", question: "Una fase de recesión se caracteriza por:", options: { A: "Baja el PIB y sube el paro.", B: "Sube el PIB y el empleo.", C: "Precios subiendo rápido.", D: "Superávit presupuestario." }, answer: "A", explanation: "La actividad económica se contrae y se pierde empleo." },
    { module: "Macroeconomía", topic: "Dinero", question: "El dinero cumple la función de:", options: { A: "Factor productivo.", B: "Medio de cambio y depósito de valor.", C: "Bien de lujo.", D: "Materia prima." }, answer: "B", explanation: "Facilita las transacciones y permite conservar riqueza en el tiempo." },
    { module: "Macroeconomía", topic: "IPC", question: "El IPC mide la evolución de los precios de:", options: { A: "Toda la producción.", B: "Una cesta de consumo representativa.", C: "Las exportaciones.", D: "Los bienes de capital." }, answer: "B", explanation: "Se centra en lo que compran habitualmente las familias." },
    { module: "Macroeconomía", topic: "Déficit", question: "Hay déficit público cuando:", options: { A: "Gasto Público > Ingresos Fiscales", B: "Importaciones > Exportaciones", C: "Paro > 10%", D: "Inflación > 2%" }, answer: "A", explanation: "El Estado gasta más de lo que recauda en impuestos." },
    { module: "Macroeconomía", topic: "Multiplicador", question: "El efecto multiplicador del gasto significa que:", options: { A: "El PIB sube más que el gasto inicial.", B: "Los impuestos se duplican.", C: "La inflación baja.", D: "Nadie ahorra." }, answer: "A", explanation: "El gasto de uno es el ingreso de otro, generando rondas sucesivas de consumo." },
    { module: "Macroeconomía", topic: "Desempleo Friccional", question: "El desempleo friccional es aquel que ocurre por:", options: { A: "Crisis profundas.", B: "Tiempo de búsqueda entre trabajos.", C: "Robots que sustituyen personas.", D: "Falta de estudios." }, answer: "B", explanation: "Es inevitable y temporal, mientras el trabajador encuentra el puesto adecuado." },
    { module: "Macroeconomía", topic: "Política Monetaria", question: "Para frenar la inflación, el Banco Central debería:", options: { A: "Bajar tipos de interés.", B: "Reducir la oferta monetaria.", C: "Imprimir más billetes.", D: "Subir el gasto público." }, answer: "B", explanation: "Menos dinero en circulación reduce la presión sobre los precios." },
    { module: "Macroeconomía", topic: "Deuda Pública", question: "La deuda pública es:", options: { A: "El déficit de un solo año.", B: "La suma acumulada de déficits pasados.", C: "Lo que las familias deben al banco.", D: "El dinero que tiene el Estado." }, answer: "B", explanation: "Representa el total de préstamos pendientes que el Estado ha pedido." },
    { module: "Macroeconomía", topic: "PIB Nominal", question: "El PIB Nominal puede subir solo por:", options: { A: "Aumento de producción.", B: "Aumento de precios (inflación).", C: "Caída del paro.", D: "Mejor tecnología." }, answer: "B", explanation: "Al usar precios corrientes, refleja tanto cambios en cantidad como en precios." },
    { module: "Macroeconomía", topic: "Convergecia", question: "La hipótesis de convergencia sugiere que:", options: { A: "Los países pobres crecen más rápido que los ricos.", B: "Todos los países serán pobres.", C: "El comercio es malo.", D: "La población siempre baja." }, answer: "A", explanation: "Al tener menos capital, su rendimiento marginal es mayor, facilitando el cierre de la brecha." }
];

let currentIdx = 0, score = 0, answered = false;
const qText = document.getElementById('question'), optBox = document.getElementById('options'), 
      topicLabel = document.getElementById('topic-title'), progressLabel = document.getElementById('progress'), 
      feedback = document.getElementById('feedback'), descText = document.getElementById('desc'), 
      nextBtn = document.getElementById('next'), quizBox = document.getElementById('quiz'), resultBox = document.getElementById('result');

function load() {
    if (currentIdx >= questionsData.length) {
        quizBox.classList.add('hidden'); resultBox.classList.remove('hidden');
        document.getElementById('score').textContent = `Nota: ${((score/questionsData.length)*100).toFixed(0)}%`;
        return;
    }
    const q = questionsData[currentIdx]; answered = false;
    topicLabel.textContent = `${q.module} | ${q.topic}`;
    progressLabel.textContent = `Pregunta ${currentIdx + 1} de ${questionsData.length}`;
    qText.textContent = q.question;
    optBox.innerHTML = ''; feedback.classList.add('hidden'); nextBtn.classList.add('hidden');
    Object.entries(q.options).forEach(([key, val]) => {
        const b = document.createElement('button'); b.className = 'option'; b.textContent = `${key}. ${val}`;
        b.onclick = () => { if(!answered){ answered=true; check(key, b); } }; optBox.appendChild(b);
    });
}

function check(choice, btn) {
    const correct = questionsData[currentIdx].answer;
    const btns = optBox.querySelectorAll('.option');
    if (choice === correct) { score++; btn.classList.add('correct'); } 
    else { btn.classList.add('incorrect'); btns.forEach(b => { if (b.textContent.startsWith(correct)) b.classList.add('correct'); }); }
    descText.textContent = questionsData[currentIdx].explanation;
    feedback.classList.remove('hidden'); nextBtn.classList.remove('hidden');
}

nextBtn.onclick = () => { currentIdx++; load(); };
window.onload = load;
</script>
</body>
</html>
