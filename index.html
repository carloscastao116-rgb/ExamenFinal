<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Economía - Mis Apuntes</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --correct: #dcfce7; --incorrect: #fee2e2; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 650px; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        #topic-title { display: block; font-weight: 800; color: var(--primary); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        .meta { color: #64748b; font-size: 0.85rem; margin-top: 5px; }
        h2 { font-size: 1.25rem; line-height: 1.4; margin: 20px 0; }
        .option { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; text-align: left; font-size: 1rem; background: white; transition: 0.2s; }
        .option:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
        .correct { background: var(--correct) !important; border-color: #22c55e !important; color: #14532d; font-weight: bold; }
        .incorrect { background: var(--incorrect) !important; border-color: #ef4444 !important; color: #7f1d1d; }
        .explanation { margin-top: 20px; padding: 15px; background: #f1f5f9; border-left: 4px solid var(--primary); border-radius: 4px; text-align: left; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div id="quiz">
        <div class="header">
            <span id="topic-title">MÓDULO | TEMA</span>
            <div id="progress" class="meta">Pregunta 1 de 40</div>
        </div>
        <h2 id="question">Cargando...</h2>
        <div id="options"></div>
        <div id="feedback" class="explanation hidden">
            <b style="color:var(--primary)">IDEA CLAVE:</b>
            <p id="desc" style="margin: 5px 0 0 0"></p>
        </div>
        <button id="next" class="btn hidden">Siguiente Pregunta</button>
    </div>
    <div id="result" class="hidden" style="text-align:center">
        <h2>Examen Finalizado</h2>
        <div id="score" style="font-size: 2rem; font-weight: bold; margin: 20px 0; color: var(--primary)"></div>
        <button onclick="location.reload()" class="btn">Repetir Simulador</button>
    </div>
</div>

<script>
const questionsData = [
    { module: "Microeconomía", topic: "Oferta y demanda", question: "¿Qué describe correctamente la demanda de un bien?", options: { A: "La relación entre precios y producción.", B: "La relación entre distintos precios posibles y las cantidades que los consumidores desean comprar.", C: "El deseo de compra sin importar el precio.", D: "La cantidad fija vendida." }, answer: "B", explanation: "En tus apuntes se distingue entre demanda y cantidad demandada: la demanda es la relación completa entre precio y cantidad deseada." },
    { module: "Microeconomía", topic: "Cambios en curvas", question: "Si sube el precio del café y, por ello, algunos consumidores compran más té, ¿qué ocurre en el mercado del té?", options: { A: "La demanda baja.", B: "La demanda del té se desplaza a la derecha.", C: "La oferta se desplaza.", D: "No ocurre nada." }, answer: "B", explanation: "Tus resúmenes remarcan que el cambio en el precio de un bien sustitutivo desplaza la curva de demanda del otro bien." },
    { module: "Microeconomía", topic: "Excedente", question: "Una persona estaba dispuesta a pagar 18 euros por un libro y finalmente lo compra por 12 euros. ¿Cuál es su excedente del consumidor?", options: { A: "6 euros.", B: "12 euros.", C: "18 euros.", D: "30 euros." }, answer: "A", explanation: "El excedente del consumidor es la diferencia entre la disposición máxima a pagar y el precio realmente pagado." },
    { module: "Microeconomía", topic: "Coordinación", question: "Si el precio de un bien se fija por debajo del precio de coordinación en un mercado competitivo, ¿qué resultado es más probable?", options: { A: "Exceso de oferta.", B: "Una escasez o desabastecimiento.", C: "Equilibrio.", D: "Baja de calidad." }, answer: "B", explanation: "Los apuntes insisten en que un precio por debajo del equilibrio genera escasez porque la cantidad demandada supera a la ofrecida." },
    { module: "Microeconomía", topic: "Precios", question: "Según el bloque sobre precios, ¿cuál es una función central del precio de mercado?", options: { A: "Garantizar igualdad de renta.", B: "Seleccionar a quienes más valoran el bien y a quienes lo producen con menor coste de oportunidad.", C: "Fijar el valor ético.", D: "Eliminar la competencia." }, answer: "B", explanation: "En el resumen de micro se explica que el precio coordina planes y asigna el bien a quienes lo valoran más, mientras atrae a oferentes con menores costes relativos." },
    { module: "Microeconomía", topic: "Elección", question: "En la elección óptima del consumidor, la relación marginal de sustitución entre dos bienes tiende a igualarse a:", options: { A: "El coste total.", B: "La renta disponible.", C: "La relación entre los precios de ambos bienes.", D: "La cantidad consumida." }, answer: "C", explanation: "Tus apuntes de micro resumen la condición de óptimo como igualdad entre la relación marginal de sustitución y la relación de precios." },
    { module: "Microeconomía", topic: "Producción", question: "Según el curso, el precio de un factor productivo se explica principalmente por:", options: { A: "El coste histórico.", B: "La productividad marginal esperada de ese factor.", C: "La decisión del gobierno.", D: "El valor del bien final." }, answer: "B", explanation: "El bloque de salarios y tipos de interés presenta los precios de los factores como derivados de su productividad marginal esperada." },
    { module: "Microeconomía", topic: "Salarios", question: "¿Cuál de estas afirmaciones encaja mejor con el bloque de salarios de tus apuntes?", options: { A: "Los salarios son fijos.", B: "Dependen de la caridad.", C: "Las mejoras salariales sostenibles dependen sobre todo de aumentos de productividad.", D: "Suben por ley siempre." }, answer: "C", explanation: "El resumen rechaza la ley de hierro de los salarios y repite que las mejoras salariales sostenibles requieren productividad más alta." },
    { module: "Microeconomía", topic: "Elasticidad", question: "Si la demanda de un bien es elástica, una subida de precio tenderá a:", options: { A: "Subir ingresos.", B: "No afectar nada.", C: "Reducir los ingresos totales.", D: "Aumentar la cantidad." }, answer: "C", explanation: "Tus apuntes de elasticidad indican que con demanda elástica, subir el precio reduce lo bastante la cantidad como para bajar los ingresos." },
    { module: "Microeconomía", topic: "Elasticidad cruzada", question: "Si la elasticidad cruzada entre dos bienes es positiva, lo más probable es que sean:", options: { A: "Complementarios.", B: "Inferiores.", C: "Bienes sustitutivos.", D: "De lujo." }, answer: "C", explanation: "En el resumen de micro, la elasticidad cruzada sirve precisamente para distinguir sustitutivos de complementarios." },
    { module: "Microeconomía", topic: "Precios", question: "Un precio máximo fijado por debajo del precio de mercado suele generar:", options: { A: "Escasez, colas y posible mercado negro.", B: "Exceso de oferta.", C: "Eficiencia.", D: "Baja de precios futuros." }, answer: "A", explanation: "Los apuntes y el PDF sobre controles de precios asocian el precio techo por debajo del mercado con desabastecimiento, racionamiento y mercado negro." },
    { module: "Microeconomía", topic: "Precios mínimos", question: "Un precio mínimo fijado por encima del precio de mercado suele provocar:", options: { A: "Escasez.", B: "Excedentes no vendidos y, en algunos casos, desempleo o capacidad ociosa.", C: "Aumento de ventas.", D: "Equilibrio justo." }, answer: "B", explanation: "Tus apuntes destacan que el precio suelo por encima del equilibrio genera excedentes, desempleo o capacidad ociosa y peor asignación." },
    { module: "Microeconomía", topic: "Externalidades", question: "Si una actividad genera una externalidad negativa y no se internaliza, el mercado tenderá a:", options: { A: "Producir menos.", B: "Producir más de lo socialmente eficiente.", C: "No producir nada.", D: "Ser eficiente." }, answer: "B", explanation: "En el bloque de externalidades se explica que las negativas empujan a sobreproducción o sobreconsumo respecto al óptimo social." },
    { module: "Microeconomía", topic: "Coase", question: "Según el teorema de Coase, una solución privada a una externalidad es más plausible cuando:", options: { A: "Los derechos de propiedad están bien definidos y los costes de transacción son bajos.", B: "El estado interviene.", C: "Los costes son altos.", D: "No hay propiedad." }, answer: "A", explanation: "Tus resúmenes de micro recogen exactamente esas dos condiciones: derechos definidos y costes de transacción bajos." },
    { module: "Microeconomía", topic: "Empresa", question: "Una empresa competitiva que maximiza beneficios debería producir hasta el punto en que:", options: { A: "Precio sea menor al coste.", B: "El precio sea igual al coste marginal.", C: "El coste sea cero.", D: "El ingreso sea máximo." }, answer: "B", explanation: "El bloque de empresa y beneficios resume la regla de maximización de forma clara: producir hasta que precio iguale al coste marginal." },
    { module: "Microeconomía", topic: "Largo plazo", question: "En equilibrio competitivo de largo plazo, la entrada y salida de empresas tiende a llevar el mercado hacia:", options: { A: "Precio igual a coste medio mínimo.", B: "Monopolio.", C: "Pérdidas.", D: "Precios infinitos." }, answer: "A", explanation: "Tus apuntes indican que la entrada y salida empujan al largo plazo hacia una situación de precio igual al coste medio mínimo." },
    { module: "Microeconomía", topic: "Competencia", question: "¿Qué entiende el curso por competencia dinámica?", options: { A: "Muchos vendedores estáticos.", B: "Un sistema de libre entrada y salida, rivalidad y descubrimiento empresarial.", C: "Precios fijos.", D: "Intervención estatal." }, answer: "B", explanation: "En la parte de competencia se diferencia entre la foto estática de muchas empresas y la visión dinámica basada en rivalidad y libre entrada." },
    { module: "Microeconomía", topic: "Carteles", question: "¿Por qué los carteles tienden a ser inestables según tus apuntes?", options: { A: "Por el gobierno.", B: "Por falta de demanda.", C: "Porque pueden entrar nuevos competidores y, además, cada miembro tiene incentivos a hacer trampa.", D: "Son muy estables." }, answer: "C", explanation: "Tanto el resumen como el PDF sobre oligopolios y carteles recalcan las dos fuentes de inestabilidad: entrada externa y engaño interno." },
    { module: "Microeconomía", topic: "Bienes", question: "Una pesquería de acceso libre encaja mejor en la categoría de:", options: { A: "Bien privado.", B: "Bien público puro.", C: "Monopolio.", D: "Recurso común." }, answer: "D", explanation: "En tu esquema de bienes, los recursos comunes son rivales en consumo y no excluibles, justo la lógica de una pesquería abierta." },
    { module: "Microeconomía", topic: "Comercio", question: "Un arancel sobre un bien importado tiende a:", options: { A: "Bajar el precio.", B: "Subir el precio interno, reducir el consumo y generar pérdida irrecuperable.", C: "Ayudar al consumidor.", D: "Aumentar importaciones." }, answer: "B", explanation: "Tus apuntes de libre comercio resumen el efecto del arancel como precio interno más alto, menor consumo, menos importaciones y pérdida irrecuperable." },
    { module: "Macroeconomía", topic: "PIB", question: "Según el enfoque del gasto, el PIB se calcula como:", options: { A: "C+I+G.", B: "C+I+G+X.", C: "C + I + G + X - M.", D: "Ventas totales." }, answer: "C", explanation: "El resumen de macro recoge la identidad básica del PIB por gasto: consumo, inversión, gasto público y exportaciones netas." },
    { module: "Macroeconomía", topic: "PIB", question: "¿Por qué las importaciones se restan en el PIB por el enfoque del gasto?", options: { A: "Porque no forman parte de la producción realizada dentro del territorio.", B: "Porque son caras.", C: "Porque no se consumen.", D: "Es un error contable." }, answer: "A", explanation: "Tus apuntes recalcan que las importaciones se restan porque ese gasto no corresponde a producción interna." },
    { module: "Macroeconomía", topic: "Valor agregado", question: "¿Qué problema busca evitar el enfoque del valor agregado por etapas?", options: { A: "La inflación.", B: "La doble contabilización de bienes intermedios.", C: "El desempleo.", D: "La caída del PIB." }, answer: "B", explanation: "Tanto el resumen como el PDF de PIB explican el valor agregado como herramienta para evitar contar varias veces la misma producción." },
    { module: "Macroeconomía", topic: "PIB Real/Nominal", question: "¿Qué mide mejor el PIB real frente al PIB nominal?", options: { A: "Los precios.", B: "Los cambios en cantidades producidas aislando, en lo posible, el efecto de los precios.", C: "La riqueza total.", D: "La deuda." }, answer: "B", explanation: "Tus apuntes subrayan que el PIB nominal mezcla precio y cantidad, mientras el real intenta quedarse con la variación de cantidades." },
    { module: "Macroeconomía", topic: "Deflactor", question: "Si sube el deflactor del PIB, eso indica que:", options: { A: "Sube el paro.", B: "Los precios medios de la producción interna están aumentando.", C: "Baja la producción.", D: "Exportamos más." }, answer: "B", explanation: "El resumen de macro presenta el deflactor como una medida amplia de precios de la producción interna." },
    { module: "Macroeconomía", topic: "IPC/Deflactor", question: "¿Cuál es la diferencia más correcta entre IPC y deflactor del PIB?", options: { A: "No hay diferencia.", B: "El IPC mide producción.", C: "El IPC se centra en el consumo de los hogares y el deflactor refleja precios de la producción interna.", D: "El deflactor es para el consumo." }, answer: "C", explanation: "En tus apuntes se repite que el IPC sirve mejor para coste de vida y el deflactor para precios de lo producido dentro del país." },
    { module: "Macroeconomía", topic: "Flujo/Stock", question: "El PIB es, sobre todo, una variable de tipo:", options: { A: "Stock.", B: "Flujo.", C: "Estática.", D: "Deuda." }, answer: "B", explanation: "El PDF sobre definición de PIB lo trata expresamente como variable flujo, no como stock." },
    { module: "Macroeconomía", topic: "Productividad", question: "La productividad marginal decreciente implica que, si un factor permanece fijo y se añade mucho del otro:", options: { A: "La producción sube siempre.", B: "El producto marginal del factor variable tiende a caer.", C: "El coste baja.", D: "No afecta." }, answer: "B", explanation: "El bloque de función de producción usa este principio para explicar por qué la acumulación de un solo factor tiene límites." },
    { module: "Macroeconomía", topic: "Interés", question: "Según tus apuntes, el tipo de interés puede descomponerse en:", options: { A: "Riesgo y dinero.", B: "Prima temporal, prima de riesgo y prima de liquidez.", C: "Solo inflación.", D: "Salarios y rentas." }, answer: "B", explanation: "El resumen de macro descompone el interés en tiempo, riesgo y liquidez, que es una de las ideas centrales del tema." },
    { module: "Macroeconomía", topic: "VPN/TIR", question: "Un proyecto con VPN positivo y TIR superior al coste de oportunidad del capital debería:", options: { A: "Rechazarse.", B: "Aceptarse, ya que crea valor.", C: "Esperar un año.", D: "No se puede saber." }, answer: "B", explanation: "Tus apuntes son directos: si el VPN es positivo y la TIR supera el coste de oportunidad, el proyecto crea valor." },
    { module: "Macroeconomía", topic: "Dinero", question: "¿Cuál de estas opciones recoge mejor una función del dinero?", options: { A: "Crear riqueza.", B: "Servir como medio de intercambio y unidad de cuenta.", C: "Pagar deudas públicas.", D: "Ser de oro." }, answer: "B", explanation: "En el bloque sobre dinero, los apuntes explican funciones clásicas como medio de intercambio, unidad de cuenta y depósito de valor." },
    { module: "Macroeconomía", topic: "Inflación", question: "¿Qué subraya la visión cualitativista de la inflacion?", options: { A: "Solo la oferta de dinero.", B: "Que la demanda de dinero, su liquidez y la confianza también importan.", C: "Que el oro no sirve.", D: "Que el estado debe fijar precios." }, answer: "B", explanation: "El resumen de macro insiste en que no basta mirar la oferta monetaria: también importa la demanda de dinero y su calidad." },
    { module: "Macroeconomía", topic: "Política Monetaria", question: "Si un banco central compra activos en mercado abierto, normalmente:", options: { A: "Sube el paro.", B: "Inyecta liquidez, eleva el precio del activo y tiende a bajar su rendimiento.", C: "Baja la inflación.", D: "Drena dinero." }, answer: "B", explanation: "Tus apuntes explican que la compra de activos inyecta reservas, sube el precio del activo y reduce su rendimiento." },
    { module: "Macroeconomía", topic: "Bancos", question: "Los bancos comerciales no pueden crear dinero ilimitadamente porque enfrentan límites de:", options: { A: "Papel moneda.", B: "Liquidez, solvencia, demanda de crédito solvente y conversión en dinero del banco central.", C: "Horarios de apertura.", D: "Número de clientes." }, answer: "B", explanation: "El bloque de dinero bancario insiste en esos límites: liquidez, solvencia, crédito solvente y conversión final en dinero del banco central." },
    { module: "Macroeconomía", topic: "Política Fiscal", question: "Una política fiscal expansiva suele implicar:", options: { A: "Subir impuestos.", B: "Bajar el gasto.", C: "Bajar impuestos o subir gasto, aumentando el sesgo expansivo del saldo fiscal.", D: "No hacer nada." }, answer: "C", explanation: "Tus apuntes de política fiscal resumen el enfoque convencional así: menos impuestos o más gasto equivalen a un sesgo expansivo." },
    { module: "Macroeconomía", topic: "Estabilizadores", question: "¿Cuál de los siguientes es un estabilizador automático?", options: { A: "Obras públicas nuevas.", B: "El seguro de desempleo que aumenta el gasto cuando entra la recesión.", C: "Subir tipos de interés.", D: "Imprimir billetes." }, answer: "B", explanation: "El resumen de macro cita de forma expresa el seguro de desempleo y la caída automática de recaudación en recesión." },
    { module: "Macroeconomía", topic: "Multiplicador", question: "¿Cuál es una de las críticas principales al multiplicador fiscal?", options: { A: "No existe.", B: "Que el endeudamiento público puede desplazar financiación privada mediante crowding out.", C: "Que es muy lento.", D: "Que solo ayuda a ricos." }, answer: "B", explanation: "Tus apuntes recogen varias críticas, y una de las más claras es el crowding out: deuda pública que desplaza crédito privado." },
    { module: "Macroeconomía", topic: "Solow", question: "En el modelo de Solow, si la inversión por trabajador supera la depreciación más la dilución, entonces:", options: { A: "El capital cae.", B: "El capital por trabajador se profundiza y aumenta.", C: "La economía se detiene.", D: "No hay cambio." }, answer: "B", explanation: "El resumen de Solow distingue entre ampliación y profundización del capital: si la inversión supera depreciación y dilución, k por trabajador aumenta." },
    { module: "Macroeconomía", topic: "Regla de Oro", question: "La regla de oro de Solow busca el nivel de capital por trabajador que:", options: { A: "Maximiza el consumo sostenible de largo plazo.", B: "Maximiza el PIB.", C: "Elimina el paro.", D: "Es cero." }, answer: "A", explanation: "Tus apuntes aclaran que la regla de oro no busca acumular sin límite, sino el capital que maximiza el consumo sostenible." },
    { module: "Macroeconomía", topic: "Salario Mínimo", question: "Si el salario mínimo sube claramente por encima de la productividad, tenderá a:", options: { A: "Aumentar el empleo.", B: "Reducir la demanda de trabajo de esas personas.", C: "No afectar.", D: "Mejorar la economía." }, answer: "B", explanation: "El resumen de macro relaciona salario máximo sostenible y productividad económica; si el salario exigido supera esa productividad, cae la demanda de trabajo." }
];

let currentIdx = 0, score = 0, answered = false;
const qText = document.getElementById('question'), optBox = document.getElementById('options'), 
      topicLabel = document.getElementById('topic-title'), progressLabel = document.getElementById('progress'), 
      feedback = document.getElementById('feedback'), descText = document.getElementById('desc'), 
      nextBtn = document.getElementById('next'), quizBox = document.getElementById('quiz'), resultBox = document.getElementById('result');

function load() {
    if (currentIdx >= questionsData.length) {
        quizBox.classList.add('hidden'); resultBox.classList.remove('hidden');
        document.getElementById('score').textContent = `Nota Final: ${((score/questionsData.length)*100).toFixed(0)}%`;
        return;
    }
    const q = questionsData[currentIdx]; answered = false;
    topicLabel.textContent = `${q.module} | ${q.topic}`;
    progressLabel.textContent = `Pregunta ${currentIdx + 1} de ${questionsData.length}`;
    qText.textContent = q.question;
    optBox.innerHTML = ''; feedback.classList.add('hidden'); nextBtn.classList.add('hidden');
    Object.entries(q.options).forEach(([key, val]) => {
        const b = document.createElement('button'); b.className = 'option'; b.textContent = `${key}. ${val}`;
        b.onclick = () => { if(!answered){ answered=true; check(key, b); } }; optBox.appendChild(b);
    });
}

function check(choice, btn) {
    const correct = questionsData[currentIdx].answer;
    const btns = optBox.querySelectorAll('.option');
    if (choice === correct) { score++; btn.classList.add('correct'); } 
    else { btn.classList.add('incorrect'); btns.forEach(b => { if (b.textContent.startsWith(correct)) b.classList.add('correct'); }); }
    descText.textContent = questionsData[currentIdx].explanation;
    feedback.classList.remove('hidden'); nextBtn.classList.remove('hidden');
}

nextBtn.onclick = () => { currentIdx++; load(); };
window.onload = load;
</script>
</body>
</html>
